definitions:
  AuthResponse:
    properties:
      token:
        type: string
    type: object
  DocumentResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  ErrorResponse:
    properties:
      error:
        properties:
          code:
            enum:
            - FORBIDDEN
            - UNAUTHORIZED
            - INVALID_CREDENTIALS
            - INVALID_REQUEST
            - INTERNAL_ERROR
            - FORM_NOT_FOUND
            - FORM_ALREADY_REJECTED
            - FORM_ALREADY_APPROVED
            - NO_AVAILABLE_EXECUTORS
            - USER_NOT_FOUND
            - USER_NOT_ACTIVE
            - USER_ALREADY_EXISTS
            - DOCUMENT_NOT_FOUND
            example: ERROR_CODE
            type: string
          message:
            type: string
        required:
        - code
        - message
        type: object
    required:
    - error
    type: object
  FormResponse:
    properties:
      createdAt:
        type: string
      id:
        type: string
      status:
        type: string
      title:
        type: string
      userId:
        type: string
    type: object
  FormWithDocsResponse:
    properties:
      attachDocs:
        items:
          $ref: '#/definitions/DocumentResponse'
        type: array
      createdAt:
        type: string
      description:
        type: string
      endDate:
        type: string
      id:
        type: string
      resolution:
        $ref: '#/definitions/Resolution'
      startDate:
        type: string
      status:
        type: string
      title:
        type: string
      userId:
        type: string
    type: object
  LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  RegisterRequest:
    properties:
      email:
        type: string
      firstName:
        minLength: 2
        type: string
      lastName:
        minLength: 2
        type: string
      password:
        minLength: 4
        type: string
      position:
        minLength: 2
        type: string
      role:
        enum:
        - employee
        - hr
        type: string
    required:
    - email
    - firstName
    - lastName
    - password
    - position
    - role
    type: object
  Resolution:
    properties:
      comment:
        type: string
      resolvedAt:
        type: string
      responseDocs:
        items:
          $ref: '#/definitions/DocumentResponse'
        type: array
    type: object
  UserResponse:
    properties:
      email:
        type: string
      firstName:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      lastName:
        type: string
      position:
        type: string
      role:
        type: string
    type: object
info:
  contact: {}
  description: RESTful API для приложения HRMate. Управление пользователями, авторизацией
    и формами.
  title: HRMate API
  version: "1.0"
paths:
  /admin/forms:
    get:
      consumes:
      - application/json
      description: Get forms with optional filters
      parameters:
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: Filter by status
        enum:
        - pending
        - approved
        - rejected
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/FormResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get forms
      tags:
      - Forms
  /admin/forms/{id}:
    delete:
      description: Permanently deletes a form and all its associated documents
      parameters:
      - description: Form ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Form and all associated documents successfully deleted
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete form
      tags:
      - Forms
    get:
      consumes:
      - application/json
      description: Get a specific form and its documents
      parameters:
      - description: Form ID
        in: path
        name: id
        required: true
        type: string
      produces:
