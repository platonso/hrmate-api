services:

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    command: server /data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-admin1234}
      - RUSTFS_S3_ACCESS_KEY=${MINIO_ACCESS_KEY:-admin}
      - RUSTFS_S3_SECRET_KEY=${MINIO_SECRET_KEY:-admin1234}
      - RUSTFS_CONSOLE_ENABLE=true
    volumes:
      - hrmate-s3-data:/data
    networks:
      - hrmate-network
    restart: unless-stopped

  rustfs-port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: rustfs-port-forwarder
    command: "tcp-listen:9001,fork,reuseaddr tcp-connect:rustfs:9001"
    ports:
      - "127.0.0.1:9001:9001"
    networks:
      - hrmate-network
    depends_on:
      - rustfs
    profiles:
      - rustfs-port-forward

  postgres:
    image: postgres:17
    container_name: pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - hrmate-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - hrmate-network

  pg-port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: pg-port-forwarder
    command: "tcp-listen:5432,fork,reuseaddr tcp-connect:postgres:5432"
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - hrmate-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - pg-port-forward

  postgres-migrator:
    image: hrmate-pg-migrator
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    pull_policy: never
    container_name: migrator
    environment:
      MIGRATION_DIR: ${MIGRATION_DIR}

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hrmate-network
    restart: "no"
    profiles:
      - migrator

  api:
    image: hrmate-api
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: api
    environment:
      HTTP_PORT: ${HTTP_PORT}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}

      MINIO_ENDPOINT: rustfs:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
    ports:
      - "${HTTP_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hrmate-network

networks:
  hrmate-network:
    name: hrmate-network
    driver: bridge

volumes:
  hrmate-data:
    name: hrmate-data
  hrmate-s3-data:
    name: hrmate-s3-data